<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold tracking-tight text-gray-900">Contas Bancárias</h1>
    <p class="text-gray-500 mt-1">Gerencie suas contas bancárias e carteiras.</p>
  </div>

  <div class="bg-white shadow-sm rounded-xl border border-gray-100 overflow-hidden">
    <div class="p-6 border-b border-gray-100 bg-gray-50/50">
      <h3 class="text-lg font-medium text-gray-900 mb-4">Adicionar Nova Conta</h3>
      <div class="flex flex-col sm:flex-row gap-4">
        <input type="text" [ngModel]="newAccountName()" (ngModelChange)="newAccountName.set($event)" placeholder="Nome da Conta (ex: Nubank)" 
               class="flex-1 rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3 border" />
        <input type="number" [ngModel]="newAccountBalance()" (ngModelChange)="newAccountBalance.set($event)" placeholder="Saldo Inicial (R$)" 
               class="w-full sm:w-48 rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3 border" />
        <button (click)="addAccount()" [disabled]="!newAccountName()"
                class="inline-flex items-center justify-center rounded-md border border-transparent bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700 disabled:opacity-50">
          <lucide-icon [img]="PlusIcon" class="w-4 h-4 mr-2"></lucide-icon> Adicionar
        </button>
      </div>
    </div>

    <ul role="list" class="divide-y divide-gray-100">
      <li *ngFor="let account of accounts()" class="flex items-center justify-between gap-x-6 p-6 hover:bg-gray-50 transition-colors">
        <div class="min-w-0">
          <div class="flex items-start gap-x-3">
            <p class="text-sm font-semibold leading-6 text-gray-900">{{ account.name }}</p>
          </div>
          <div class="mt-1 flex items-center gap-x-2 text-xs leading-5 text-gray-500">
            <p class="truncate">Criado em: {{ account.created_at | date:'dd/MM/yyyy HH:mm' }}</p>
          </div>
        </div>
        <div class="flex flex-col items-end gap-y-2">
          <p class="text-lg font-bold" [ngClass]="{'text-emerald-600': (account.balance || 0) >= 0, 'text-red-600': (account.balance || 0) < 0}">
            {{ account.balance | currency:'BRL' }}
          </p>
          <button (click)="deleteAccount(account.id!)" class="text-red-500 hover:text-red-700 text-xs flex items-center mt-1">
            <lucide-icon [img]="TrashIcon" class="w-3 h-3 mr-1"></lucide-icon> Excluir
          </button>
        </div>
      </li>
      <li *ngIf="accounts().length === 0" class="p-8 text-center text-gray-500">
        Nenhuma conta cadastrada ainda. Adicione uma acima.
      </li>
    </ul>
  </div>
</div>
