<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold tracking-tight text-text">Categorias</h1>
    <p class="text-textMuted mt-1">Organize seus rendimentos e despesas.</p>
  </div>

  <div class="bg-card shadow-sm rounded-xl border border-border overflow-hidden">
    <div class="p-6 border-b border-border bg-bg/50">
      <h3 class="text-lg font-medium text-text mb-4">Criar Categoria</h3>
      <div class="flex flex-col sm:flex-row gap-4">
        <input type="text" [ngModel]="newCategoryName()" (ngModelChange)="newCategoryName.set($event)" placeholder="Nome (ex: Alimentação)" 
               class="flex-1 rounded-md border-border bg-bg shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3 border text-text" />
        
        <select [ngModel]="newCategoryType()" (ngModelChange)="newCategoryType.set($event)" class="w-full sm:w-48 rounded-md border-border bg-bg shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3 border text-text">
          <option value="D" class="bg-card">Despesa</option>
          <option value="C" class="bg-card">Receita</option>
        </select>

        <button (click)="addCategory()" [disabled]="!newCategoryName()"
                class="inline-flex items-center justify-center rounded-md border border-transparent bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700 disabled:opacity-50">
          <lucide-icon [img]="PlusIcon" class="w-4 h-4 mr-2"></lucide-icon> Adicionar
        </button>
      </div>
    </div>

    <ul role="list" class="divide-y divide-border">
      <li *ngFor="let cat of categories()" class="flex items-center justify-between gap-x-6 p-6 hover:bg-bg transition-colors">
        <div class="min-w-0">
          <div class="flex items-start gap-x-3">
            <p class="text-sm font-semibold leading-6 text-text">{{ cat.name }}</p>
            <span [ngClass]="{'bg-red-100 text-red-700': cat.type === 'D', 'bg-emerald-100 text-emerald-700': cat.type === 'C'}" 
                  class="rounded-full px-2 py-1 text-xs font-medium">
              {{ cat.type === 'D' ? 'Despesa' : 'Receita' }}
            </span>
          </div>
        </div>
        <div class="flex flex-col items-end gap-y-2">
          <button (click)="deleteCategory(cat.id!)" class="text-red-500 hover:text-red-700 text-xs flex items-center">
            <lucide-icon [img]="TrashIcon" class="w-3 h-3 mr-1"></lucide-icon> Excluir
          </button>
        </div>
      </li>
      <li *ngIf="categories().length === 0" class="p-8 text-center text-textMuted">
        Nenhuma categoria cadastrada.
      </li>
    </ul>
  </div>
</div>
