<div class="flex h-screen bg-gray-50 font-sans text-gray-900 overflow-hidden">
  
  <!-- Sidebar Desktop -->
  <aside class="w-72 bg-white shadow-2xl flex flex-col border-r border-gray-100 hidden md:flex z-20 transition-all duration-300">
    <div class="h-20 flex items-center px-8 border-b border-gray-100">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-700 flex items-center justify-center text-white font-bold text-xl shadow-lg transform rotate-3 hover:rotate-0 transition-transform duration-300">
        $
      </div>
      <div class="ml-4 flex flex-col">
        <span class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-indigo-900 tracking-tighter leading-tight">Finance Hub</span>
        <span class="text-[10px] text-gray-400 uppercase tracking-[0.2em] font-bold">Personal Control</span>
      </div>
    </div>

    <nav class="flex-1 py-8 px-5 space-y-2 overflow-y-auto custom-scrollbar">
      <ng-container *ngFor="let item of menuItems()">
        <!-- Single Item -->
        <a *ngIf="!item.children"
           [routerLink]="item.route" 
           routerLinkActive="active-link"
           [routerLinkActiveOptions]="{exact: true}"
           class="nav-item group">
          <lucide-icon [img]="item.icon" class="nav-icon"></lucide-icon>
          <span class="flex-1">{{ item.label }}</span>
        </a>

        <!-- Group Item -->
        <div *ngIf="item.children" class="space-y-1">
          <button (click)="toggleGroup(item.label)"
                  [class.text-blue-600]="expandedGroups()[item.label]"
                  class="nav-item w-full group">
            <lucide-icon [img]="item.icon" class="nav-icon" [class.text-blue-500]="expandedGroups()[item.label]"></lucide-icon>
            <span class="flex-1 text-left">{{ item.label }}</span>
            <lucide-icon [img]="expandedGroups()[item.label] ? ChevronDownIcon : ChevronRightIcon" 
                         class="w-4 h-4 text-gray-400 group-hover:text-blue-400 transition-transform"
                         [class.rotate-180]="expandedGroups()[item.label]">
            </lucide-icon>
          </button>
          
          <div *ngIf="expandedGroups()[item.label]" 
               class="pl-11 space-y-1 overflow-hidden transition-all duration-300 animate-slide-down">
            <a *ngFor="let child of item.children"
               [routerLink]="child.route"
               routerLinkActive="active-sub-link"
               class="nav-sub-item group">
              {{ child.label }}
            </a>
          </div>
        </div>
      </ng-container>
    </nav>

    <!-- <div class="p-6 border-t border-gray-50">
      <div class="flex items-center space-x-3 p-3 rounded-2xl bg-gray-50 border border-gray-100">
        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold border-2 border-white shadow-sm">
          AD
        </div>
        <div class="flex flex-col min-w-0">
          <span class="text-sm font-bold text-gray-900 truncate">Administrador</span>
          <span class="text-xs text-gray-500 truncate">Premium Account</span>
        </div>
      </div>
    </div> -->
  </aside>

  <!-- Mobile Menu Overlay -->
  <div *ngIf="isMobileMenuOpen()" 
       (click)="closeMobileMenu()"
       class="fixed inset-0 bg-gray-950/40 backdrop-blur-sm z-40 md:hidden transition-opacity duration-300">
  </div>

  <!-- Mobile Sidebar (Drawer) -->
  <aside [class.translate-x-0]="isMobileMenuOpen()"
         [class.-translate-x-full]="!isMobileMenuOpen()"
         class="fixed inset-y-0 left-0 w-80 bg-white shadow-2xl z-50 md:hidden transition-transform duration-300 ease-out flex flex-col">
    <div class="h-20 flex items-center justify-between px-6 border-b border-gray-100">
      <div class="flex items-center">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-700 flex items-center justify-center text-white font-bold text-xl shadow-lg">
          $
        </div>
        <span class="ml-3 text-xl font-bold text-gray-900 tracking-tight">Finance Hub</span>
      </div>
      <button (click)="closeMobileMenu()" class="p-2 rounded-full hover:bg-gray-100 transition-colors">
        <lucide-icon [img]="XIcon" class="w-6 h-6 text-gray-500"></lucide-icon>
      </button>
    </div>

    <nav class="flex-1 py-6 px-4 space-y-2 overflow-y-auto">
      <ng-container *ngFor="let item of menuItems()">
        <a *ngIf="!item.children"
           [routerLink]="item.route" 
           (click)="closeMobileMenu()"
           routerLinkActive="active-link"
           [routerLinkActiveOptions]="{exact: true}"
           class="nav-item group">
          <lucide-icon [img]="item.icon" class="nav-icon"></lucide-icon>
          <span class="flex-1">{{ item.label }}</span>
        </a>

        <div *ngIf="item.children" class="space-y-1">
          <button (click)="toggleGroup(item.label)"
                  [class.text-blue-600]="expandedGroups()[item.label]"
                  class="nav-item w-full group">
            <lucide-icon [img]="item.icon" class="nav-icon" [class.text-blue-500]="expandedGroups()[item.label]"></lucide-icon>
            <span class="flex-1 text-left">{{ item.label }}</span>
            <lucide-icon [img]="expandedGroups()[item.label] ? ChevronDownIcon : ChevronRightIcon" 
                         class="w-4 h-4 text-gray-400 transition-transform"
                         [class.rotate-180]="expandedGroups()[item.label]">
            </lucide-icon>
          </button>
          
          <div *ngIf="expandedGroups()[item.label]" class="pl-11 space-y-1">
            <a *ngFor="let child of item.children"
               [routerLink]="child.route"
               (click)="closeMobileMenu()"
               routerLinkActive="active-sub-link"
               class="nav-sub-item">
              {{ child.label }}
            </a>
          </div>
        </div>
      </ng-container>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden bg-gray-50 relative">
    
    <!-- Topbar -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 h-16 flex items-center justify-between px-6 border-b border-gray-200 z-30">
      <div class="flex items-center">
        <button (click)="toggleMobileMenu()" class="md:hidden p-2 -ml-2 mr-2 rounded-xl hover:bg-gray-100 transition-colors text-gray-600">
          <lucide-icon [img]="MenuIcon" class="w-6 h-6"></lucide-icon>
        </button>
        <div class="hidden md:flex items-center space-x-2 text-sm text-gray-400 font-medium">
          <span>Overview</span>
          <lucide-icon [img]="ChevronRightIcon" class="w-3 h-3"></lucide-icon>
          <span class="text-blue-600 font-semibold">Dashboard</span>
        </div>
        <div class="md:hidden flex items-center">
          <span class="text-lg font-bold text-gray-900 tracking-tight">Dashboard</span>
        </div>
      </div>

      <div class="flex items-center space-x-4">
        <button class="p-2 rounded-full hover:bg-gray-100 text-gray-400 transition-colors relative cursor-pointer">
          <div class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></div>
          <lucide-icon [img]="ShieldAlertIcon" class="w-5 h-5"></lucide-icon>
        </button>
        <button class="p-2 rounded-full hover:bg-gray-100 text-gray-400 transition-colors relative cursor-pointer">
          <div class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></div>
          <lucide-icon [img]="BellIcon" class="w-5 h-5"></lucide-icon>
        </button>
        <!-- <div class="h-10 w-10 rounded-2xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold border border-indigo-200 shadow-lg cursor-pointer hover:scale-105 transition-transform">
          AD
        </div> -->
      </div>
    </header>

    <!-- Page Content -->
    <div class="flex-1 overflow-y-auto p-6 md:p-8 lg:p-10 scroll-smooth">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </div>
    
  </main>
</div>
