<div *ngIf="isOpen" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div 
    @backdrop
    class="absolute inset-0 bg-bg/80 backdrop-blur-sm"
    (click)="closeModal()"
  ></div>

  <!-- Modal Content -->
  <div 
    @modal
    class="relative w-full max-w-md bg-card border border-border/50 rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[90vh]"
  >
    <!-- Header -->
    <div class="px-6 py-4 border-b border-border/50 flex items-center justify-between bg-card">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-primary/10 rounded-xl text-primary">
          <lucide-angular [img]="CalculatorIcon" size="24" strokeWidth="2"></lucide-angular>
        </div>
        <div>
          <h2 class="text-lg font-semibold text-text">Posso gastar isso?</h2>
          <p class="text-sm text-text-muted">Simulador de impacto financeiro</p>
        </div>
      </div>
      <button 
        (click)="closeModal()"
        class="p-2 text-text-muted hover:text-text hover:bg-border/50 rounded-xl transition-colors"
      >
        <lucide-angular [img]="CloseIcon" size="20"></lucide-angular>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 overflow-y-auto custom-scrollbar">
      
      <!-- Input Section -->
      <div *ngIf="!result" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Qual o valor do gasto?</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-text-muted font-medium">R$</span>
            <input 
              type="number" 
              [(ngModel)]="amount"
              class="w-full pl-12 pr-4 py-3 bg-bg border border-border/50 rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder-text-muted/50 text-lg font-medium"
              placeholder="0.00"
            >
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Categoria (Opcional)</label>
          <select 
            [(ngModel)]="categoryId"
            class="w-full px-4 py-3 bg-bg border border-border/50 rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
          >
            <option [ngValue]="null">Geral (Sem categoria específica)</option>
            <option *ngFor="let cat of categories" [ngValue]="cat.id">{{ cat.name }}</option>
          </select>
        </div>

        <button 
          (click)="simulate()"
          [disabled]="!amount || amount <= 0 || isSimulating"
          class="w-full py-3 bg-primary hover:bg-primary/90 text-white rounded-xl font-medium transition-colors mt-6 flex justify-center items-center gap-2 disabled:opacity-50"
        >
          <lucide-angular *ngIf="!isSimulating" [img]="CalculatorIcon" size="20"></lucide-angular>
          {{ isSimulating ? 'Simulando...' : 'Simular Impacto' }}
        </button>
      </div>

      <!-- Result Section -->
      <div *ngIf="result" class="space-y-6">
        
        <div class="flex items-center gap-3 p-4 rounded-xl border animate-in fade-in slide-in-from-bottom-2 duration-300"
             [ngClass]="{
               'bg-success/10 border-success/20 text-success': result.status === 'success',
               'bg-warning/10 border-warning/20 text-warning': result.status === 'warning',
               'bg-danger/10 border-danger/20 text-danger': result.status === 'critical'
             }">
          <lucide-angular [img]="result.status === 'success' ? CheckCircleIcon : (result.status === 'warning' ? AlertTriangleIcon : XCircleIcon)" size="32"></lucide-angular>
          <h3 class="text-xl font-bold">{{ result.title }}</h3>
        </div>

        <div class="space-y-3">
          <div *ngFor="let desc of result.descriptions" class="flex gap-3 text-text bg-bg p-3 rounded-lg border border-border/50 text-sm animate-in fade-in slide-in-from-bottom-1 duration-300">
             <lucide-angular [img]="HelpIcon" size="18" class="text-primary shrink-0 mt-0.5"></lucide-angular>
             <span>{{ desc }}</span>
          </div>
        </div>

        <div class="flex gap-3 pt-4 border-t border-border/50">
           <button 
             *ngIf="result.suggest24hRule"
             (click)="apply24hRule()"
             class="flex-1 py-3 bg-warning/20 hover:bg-warning/30 text-warning rounded-xl font-medium transition-colors flex items-center justify-center gap-2"
           >
             <lucide-angular [img]="SaveIcon" size="20"></lucide-angular>
             Aplicar Regra 24h
           </button>
           
           <button 
             (click)="reset()"
             class="flex-1 py-3 border border-border/50 hover:bg-border/50 text-text rounded-xl font-medium transition-colors"
           >
             Tentar Outro
           </button>
        </div>

      </div>

    </div>
  </div>
</div>
