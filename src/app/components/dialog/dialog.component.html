<div *ngIf="config" class="fixed inset-0 z-50 flex items-center justify-center p-4" @backdrop>
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm" (click)="close(false)"></div>

  <!-- Modal content -->
  <div class="relative w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden" @modal>
    
    <!-- Top bar with icon -->
    <div class="p-6">
      <div class="flex items-start gap-4">
        <!-- Icon container -->
        <div [class]="'flex-shrink-0 w-12 h-12 rounded-xl border flex items-center justify-center ' + getIconClass(config.type)">
          <lucide-icon [name]="getIcon(config.type)" size="24"></lucide-icon>
        </div>

        <!-- Content -->
        <div class="flex-1 min-w-0">
          <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2 leading-tight">
            {{ config.title }}
          </h3>
          <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">
            {{ config.message }}
          </p>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-end gap-3 px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-700/50">
      <button 
        *ngIf="config.showCancel"
        type="button" 
        (click)="close(false)"
        class="px-4 py-2.5 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors"
      >
        {{ config.cancelText || 'Cancelar' }}
      </button>
      
      <button 
        type="button" 
        (click)="close(true)"
        [class]="'px-6 py-2.5 rounded-lg text-sm font-semibold text-white shadow-lg shadow-opacity-20 transition-all active:scale-95 focus:outline-none focus:ring-2 focus:ring-offset-2 ' + getButtonClass(config.type)"
      >
        {{ config.confirmText || 'Confirmar' }}
      </button>
    </div>

  </div>
</div>
